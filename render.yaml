services:
  # ─── Backend: FastAPI Web Service ─────────────────────────────────────────
  - type: web
    name: aura-h-backend
    runtime: python
    rootDir: backend/medical-backend/backend
    buildCommand: pip install -r requirements.txt && python seed_data.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # ─── Frontend: React Static Site ──────────────────────────────────────────
  - type: web
    name: aura-h-frontend
    runtime: static
    rootDir: frontend/aura-care-connect
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: aura-h-backend
          property: host
        prepend: https://
        suffix: /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
